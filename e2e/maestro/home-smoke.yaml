# TeNow mobile smoke flow (run with Maestro + Expo Go)
# Prerequisites: npx expo start, then open the project in Expo Go on device/emulator
#
# Install Maestro: https://maestro.mobile.dev/docs/getting-started/installing-maestro
# Run: npm run test:e2e:mobile

appId: host.exp.exponent
---
- launchApp
- tapOn:
    text: "TeNow"
    optional: true
- assertVisible: "Welcome back"
- assertVisible: "Join a class"
- assertVisible: "Create a class"
- assertVisible: "Create organization"
